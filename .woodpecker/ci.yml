# .woodpecker/test.yml
# Main test pipeline - runs on push and pull requests

when:
  event: [push, pull_request, manual]
  branch: master

steps:
  - name: lint
    image: jlipworth/jl-lseg-toolkit-ci:latest
    pull: true
    commands:
      - uv sync --frozen --only-group test
      - .venv/bin/ruff check src/ tests/
      - .venv/bin/ruff format --check src/ tests/

  - name: typecheck
    image: jlipworth/jl-lseg-toolkit-ci:latest
    pull: true
    commands:
      - uv sync --frozen --only-group test
      - MYPYPATH=src .venv/bin/mypy src/

  - name: test
    image: jlipworth/jl-lseg-toolkit-ci:latest
    pull: true
    commands:
      - uv sync --frozen
      - .venv/bin/pytest tests/ -m "not integration" --no-cov -v

  - name: notify-success
    image: appleboy/drone-discord
    depends_on: [lint, typecheck, test]
    when:
      - status: success
    settings:
      webhook_id:
        from_secret: discord_id
      webhook_token:
        from_secret: discord_token
      message: >
        Build succeeded for {{repo.name}}
        Branch: {{commit.branch}}
        {{build.link}}

  - name: notify-failure
    image: appleboy/drone-discord
    depends_on: [lint, typecheck, test]
    when:
      - status: failure
    settings:
      webhook_id:
        from_secret: discord_id
      webhook_token:
        from_secret: discord_token
      message: >
        Build failed for {{repo.name}}
        Branch: {{commit.branch}}
        {{build.link}}
